server {
    listen 80;
    server_name kidspark.mybellon.com www.kidspark.mybellon.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kidspark.mybellon.com www.kidspark.mybellon.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/kidspark.mybellon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidspark.mybellon.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout       60s;
        proxy_send_timeout          60s;
        proxy_read_timeout          60s;
    }

    # Static assets — serve directly with long cache
    location /_next/static/ {
        proxy_pass   http://localhost:3001;
        add_header   Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers (supplements Next.js headers)
    add_header X-Robots-Tag "index, follow";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
